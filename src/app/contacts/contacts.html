<style>
  .contact-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
    padding: 4rem;
    border-radius: 12px;
    color: #e0e0e0;
  }
  
  .contact-column h2 {
    font-size: 2rem;
    margin-bottom: 2.5rem;
    color: #fff;
    font-weight: 300;
    letter-spacing: 1px;
  }
  
  .contact-info {
    margin-bottom: 2rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }
  
  .contact-info:last-of-type {
    border-bottom: none;
  }
  
  .contact-info h3 {
    font-size: 0.9rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 0.8rem;
    font-weight: 500;
  }
  
  .contact-info p {
    margin: 0;
    font-size: 1.1rem;
    color: #e0e0e0;
  }
  
  .contact-info a {
    color: #e0e0e0;
    text-decoration: none;
    transition: all 0.3s ease;
    position: relative;
  }
  
  .contact-info a:hover {
    color: #fff;
  }
  
  .social-links {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
  }
  
  .social-links h3 {
    font-size: 0.9rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 1.5rem;
    font-weight: 500;
  }
  
  .social-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    color: #e0e0e0;
    text-decoration: none;
    margin-right: 1rem;
    transition: all 0.3s ease;
    font-size: 1.2rem;
  }
  
  .social-icon:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
    color: #fff;
  }
  
  .map-column {
    display: flex;
    flex-direction: column;
  }
  
  .map-column iframe {
    border-radius: 8px;
    background: #0a0a0a;
  }
  
  @media (max-width: 768px) {
    .contact-container {
      grid-template-columns: 1fr;
      gap: 2rem;
      padding: 2rem;
    }
    
    .contact-column h2 {
      font-size: 1.5rem;
    }
  }
</style>
